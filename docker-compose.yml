services:
  backend:
    build:
      context: ./backend
    environment:
      KIKOTO_DEV_MODE: ${KIKOTO_DEV_MODE:-true}
      KIKOTO_ROOT_USERNAME: ${KIKOTO_ROOT_USERNAME:-root}
      KIKOTO_ROOT_PASSWORD: ${KIKOTO_ROOT_PASSWORD:-change-me}
      KIKOTO_HTTP_ADDR: ${KIKOTO_HTTP_ADDR:-0.0.0.0:7659}
      KIKOTO_DB_PATH: ${KIKOTO_DB_PATH:-/config/kikoto.db}
      KIKOTO_DATA_ROOT: ${KIKOTO_DATA_ROOT:-/data}
      KIKOTO_CACHE_ROOT: ${KIKOTO_CACHE_ROOT:-/cache}
      KIKOTO_LOCAL_SCAN_DEPTH: ${KIKOTO_LOCAL_SCAN_DEPTH:-4}
      KIKOTO_SESSION_COOKIE_SECURE: ${KIKOTO_SESSION_COOKIE_SECURE:-false}
      KIKOTO_REMOTE_SOURCES_ENABLED: ${KIKOTO_REMOTE_SOURCES_ENABLED:-false}
      KIKOTO_REMOTE_SOURCES_FILE: ${KIKOTO_REMOTE_SOURCES_FILE:-/config/remote-sources.yml}
    ports:
      - "7659:7659"
    volumes:
      - ./config:/config
      - ./cache:/cache
      - ./data:/data

  frontend:
    build:
      context: ./frontend
    ports:
      - "7655:80"
    depends_on:
      - backend
