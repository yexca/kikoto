<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#b32d57" />
    <meta name="application-name" content="Kikoto" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="/kikoto-icon.svg" />
    <link rel="apple-touch-icon" href="/kikoto-icon-192.png" />
    <script>
      (() => {
        const mode = localStorage.getItem("kikoto:theme") || "system";
        const storedAccent = localStorage.getItem("kikoto:theme-accent");
        const accent = storedAccent === "blue" || storedAccent === "green" ? storedAccent : "pink";
        const dark =
          mode === "dark" || (mode === "system" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        document.documentElement.classList.toggle("dark", dark);
        document.documentElement.dataset.themeAccent = accent;
        const themeColors = {
          pink: { light: "#b32d57", dark: "#f47ca0" },
          blue: { light: "#2069c8", dark: "#6da9f7" },
          green: { light: "#29905b", dark: "#62da94" },
        };
        document.querySelector('meta[name="theme-color"]').content = themeColors[accent][dark ? "dark" : "light"];
      })();
    </script>
    <title>Kikoto</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
