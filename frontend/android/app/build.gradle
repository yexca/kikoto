apply plugin: 'com.android.application'

def versionFile = new File(rootProject.projectDir, "../../VERSION")
if (!versionFile.isFile()) {
    throw new GradleException("Missing root VERSION file: ${versionFile}")
}

def kikotoVersion = versionFile.text.trim()
if (!(kikotoVersion ==~ /^v\d+\.\d+\.\d+$/)) {
    throw new GradleException("VERSION must use v<major>.<minor>.<patch>: ${kikotoVersion}")
}

def kikotoVersionName = kikotoVersion.substring(1)
def requestedVersionName = project.findProperty("KIKOTO_VERSION_NAME") ?: System.getenv("KIKOTO_VERSION_NAME")
if (requestedVersionName && requestedVersionName.toString() != kikotoVersionName) {
    throw new GradleException("KIKOTO_VERSION_NAME ${requestedVersionName} does not match VERSION ${kikotoVersion}")
}

def versionParts = kikotoVersionName.tokenize('.').collect { it.toInteger() }
if (versionParts[1] > 999 || versionParts[2] > 999) {
    throw new GradleException("Android versionCode supports minor and patch values up to 999")
}
def derivedVersionCode = versionParts[0] * 1000000 + versionParts[1] * 1000 + versionParts[2]
def kikotoVersionCode = (project.findProperty("KIKOTO_VERSION_CODE") ?: System.getenv("KIKOTO_VERSION_CODE") ?: derivedVersionCode).toString().toInteger()
if (kikotoVersionCode <= 0 || kikotoVersionCode > 2100000000) {
    throw new GradleException("Android versionCode must be between 1 and 2100000000")
}
def releaseKeystoreFile = project.findProperty("KIKOTO_KEYSTORE_FILE") ?: System.getenv("KIKOTO_KEYSTORE_FILE")
def releaseKeystorePassword = project.findProperty("KIKOTO_KEYSTORE_PASSWORD") ?: System.getenv("KIKOTO_KEYSTORE_PASSWORD")
def releaseKeyAlias = project.findProperty("KIKOTO_KEY_ALIAS") ?: System.getenv("KIKOTO_KEY_ALIAS")
def releaseKeyPassword = project.findProperty("KIKOTO_KEY_PASSWORD") ?: System.getenv("KIKOTO_KEY_PASSWORD")
def hasReleaseSigning = releaseKeystoreFile && releaseKeystorePassword && releaseKeyAlias && releaseKeyPassword

android {
    namespace = "com.yexca.kikoto"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.yexca.kikoto"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode kikotoVersionCode
        versionName kikotoVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(releaseKeystoreFile)
                storePassword releaseKeystorePassword
                keyAlias releaseKeyAlias
                keyPassword releaseKeyPassword
            }
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation "androidx.media:media:$androidxMediaVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
