name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  actions: read
  contents: write
  packages: write

env:
  IMAGE_NAME: kikoto

jobs:
  verify_release:
    name: Verify release source
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.version_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tag and version
        id: version
        shell: bash
        run: |
          expected_version="$(tr -d '\r\n' < VERSION)"
          if [ "$GITHUB_REF_NAME" != "$expected_version" ]; then
            echo "Tag $GITHUB_REF_NAME does not match VERSION $expected_version." >&2
            exit 1
          fi
          echo "version_name=${expected_version#v}" >> "$GITHUB_OUTPUT"

      - name: Verify release notes
        shell: bash
        run: |
          notes_file="docs/history/${GITHUB_REF_NAME}.md"
          if [ ! -f "$notes_file" ]; then
            echo "Missing release notes: $notes_file" >&2
            exit 1
          fi

      - name: Require successful main CI for this commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          successful_runs="$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/ci.yml/runs?head_sha=${GITHUB_SHA}&event=push&per_page=100" \
            --jq '[.workflow_runs[] | select(.head_branch == "main" and .status == "completed" and .conclusion == "success")] | length')"
          if [ "$successful_runs" -lt 1 ]; then
            echo "No successful main CI run exists for commit $GITHUB_SHA. Wait for CI before creating the tag." >&2
            exit 1
          fi

  build_and_push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: verify_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ github.repository_owner }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Kikoto
            org.opencontainers.image.description=Local-first personal audio library

      - name: Build and push production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  build_apk:
    name: Build and upload APK
    runs-on: ubuntu-latest
    needs: verify_release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release version
        run: |
          echo "KIKOTO_VERSION_NAME=${{ needs.verify_release.outputs.version_name }}" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Sync Android web assets
        working-directory: frontend
        run: npm run cap:sync

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ] || [ -z "$ANDROID_KEY_PASSWORD" ]; then
            echo "ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS, and ANDROID_KEY_PASSWORD secrets are required for release APK signing." >&2
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/kikoto-release.keystore"
          echo "KIKOTO_KEYSTORE_FILE=$RUNNER_TEMP/kikoto-release.keystore" >> "$GITHUB_ENV"

      - name: Build signed release APK
        working-directory: frontend/android
        env:
          KIKOTO_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KIKOTO_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KIKOTO_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Prepare APK asset
        run: |
          mkdir -p frontend/release-artifacts
          cp frontend/android/app/build/outputs/apk/release/app-release.apk "frontend/release-artifacts/kikoto-${KIKOTO_VERSION_NAME}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kikoto-android-apk
          path: frontend/release-artifacts/*.apk
          if-no-files-found: error

  publish_release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - verify_release
      - build_and_push
      - build_apk

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: kikoto-android-apk
          path: release-artifacts

      - name: Create release and upload APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KIKOTO_VERSION_NAME: ${{ needs.verify_release.outputs.version_name }}
        run: |
          notes_file="docs/history/${GITHUB_REF_NAME}.md"
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          else
            gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --title "$GITHUB_REF_NAME" --notes-file "$notes_file"
          fi
          gh release upload "$GITHUB_REF_NAME" "release-artifacts/kikoto-${KIKOTO_VERSION_NAME}.apk" --repo "$GITHUB_REPOSITORY" --clobber
